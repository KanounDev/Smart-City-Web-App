<h2>Submit Request</h2>

<form (submit)="submit()">
    <div>
        <label>Name:</label>
        <input [(ngModel)]="request.name" name="name" placeholder="Name" required>
    </div>
    <div>
        <label>Municipality:</label>
        <input [(ngModel)]="request.municipality" name="municipality" readonly>
    </div>
    <div>
        <label>Description:</label>
        <input [(ngModel)]="request.description" name="description" placeholder="Description" required>
    </div>

    <div>
        <label>Category:</label>
        <select [(ngModel)]="request.category" name="category">
    <option value="">All Categories</option>

    <!-- Food & Drinks -->
        <option value="Restaurant">Restaurant</option>
        <option value="Café">Café</option>
        <option value="Fast Food">Fast Food</option>
        <option value="Bakery">Bakery</option>
        <option value="Pastry Shop">Pastry Shop</option>

        <!-- Retail -->
        <option value="Grocery Store">Grocery Store</option>
        <option value="Supermarket">Supermarket</option>
        <option value="Clothing Store">Clothing Store</option>
        <option value="Electronics Store">Electronics Store</option>
        <option value="Bookstore">Bookstore</option>
        <option value="Flower Shop">Flower Shop</option>

        <!-- Services -->
        <option value="Barber / Hair Salon">Barber / Hair Salon</option>
        <option value="Beauty Salon">Beauty Salon</option>
        <option value="Laundry / Dry Cleaning">Laundry / Dry Cleaning</option>
        <option value="Repair Shop">Repair Shop</option>
        <option value="Printing / Copy Center">Printing / Copy Center</option>

        <!-- Automotive -->
        <option value="Mechanic">Mechanic</option>
        <option value="Car Wash">Car Wash</option>
        <option value="Gas Station">Gas Station</option>
        <option value="Tire Shop">Tire Shop</option>

        <!-- Health -->
        <option value="Pharmacy">Pharmacy</option>
        <option value="Clinic">Clinic</option>
        <option value="Dentist">Dentist</option>
        <option value="Veterinary">Veterinary</option>

        <!-- Leisure -->
        <option value="Gym">Gym</option>
        <option value="Cinema">Cinema</option>
        <option value="Game Center">Game Center</option>

        <!-- Public -->
        <option value="Bank">Bank</option>
        <option value="Post Office">Post Office</option>
        </select>
    </div>

    <div>
        <label>Address:</label>
        <input [(ngModel)]="request.address" name="address" placeholder="Address" required>
    </div>
    <div>
        <label>Latitude:</label>
        <input type="number" [(ngModel)]="request.latitude" name="latitude" step="any" min="-90" max="90" placeholder="e.g. 36.8065" required>
    </div>

    <div>
        <label>Longitude:</label>
        <input type="number" [(ngModel)]="request.longitude" name="longitude" step="any" min="-180" max="180" placeholder="e.g. 10.1815" required>
    </div>
    <div class="file-upload-section">
        <label>Supporting Documents (optional):</label>
        <label class="custom-file-upload" for="file-input">  
            Choose Files or Drag Here
        </label>
        <input id="file-input" type="file" multiple (change)="onFileChange($event)" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" hidden>
        <p class="upload-hint">Supported: PDF, images, Word docs. No file chosen yet.</p>

        @if (selectedFiles.length > 0) {
        <div class="file-preview">
            <h4>Selected Files:</h4>
            <ul>
                @for (file of selectedFiles; track $index) {
                <li>
                    <span class="file-name">
        {{ file.name }} ({{ file.size | number }} bytes)
    </span>

                    <button type="button" (click)="removeFile($index)" class="remove-btn">
        × Remove
    </button>
                </li>
                }
            </ul>
        </div>
        }
    </div>

    <button type="submit">Submit</button>
</form>
